services:
  airflow:
    image: apache/airflow:2.10.4-python3.11
    container_name: atm-airflow
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      KAFKA_BOOTSTRAP_SERVERS: "atm-kafka:29092"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ../consumer:/opt/project/consumer
      - ../producer:/opt/project/producer
      - ../requirements.txt:/opt/project/requirements.txt
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname Igor --lastname Elipechuk --role Admin --email admin@example.com || true &&
      airflow standalone
      "

networks:
  default:
    external: true
    name: atm-network
